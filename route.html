<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bus Route</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-success shadow">
    <div class="container">
        <a class="navbar-brand fw-bold">
            <i class="bi bi-signpost-split-fill"></i>
            Route Details
        </a>

        <div>
            <button class="btn btn-light btn-sm me-2" onclick="window.print()">
                <i class="bi bi-printer"></i>
                Print
            </button>

            <button class="btn btn-warning btn-sm" onclick="history.back()">
                <i class="bi bi-arrow-left"></i>
                Back
            </button>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="dashboard-card text-center">
                <h6>Trip</h6>
                <h5 id="tripName">-</h5>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dashboard-card text-center">
                <h6>Vehicle</h6>
                <h5 id="vehicleNo">-</h5>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dashboard-card text-center">
                <h6>Total Stops</h6>
                <h5 id="stopCount">0</h5>
            <div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <div class="d-flex justify-content-between">
                <h5 class="mb-0">
                    <i class="bi bi-geo-alt-fill"></i>
                    Route Timeline
                </h5>
                <span id="depotName"></span>
            </div>
        </div>
        <div class="card-body">
            <div id="loadingRoute" class="text-center py-5">
                <div class="spinner-border text-success"></div>
                <p class="mt-3">Loading Route...</p>
            </div>
            <div id="timeline" class="timeline d-none">
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/route.js"></script>

</body>
</html>
